version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    environment:
      - API_DP_URL=${API_DP_URL}
      - PORT=${PORT:-3000}
    env_file:
      - .env

  frontend:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
