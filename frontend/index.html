<!DOCTYPE html>

  <main class="container">
    <!-- Formulario de búsqueda — implementado por Franck (Turno 2) -->

      </div>

    <!-- Resultado y línea de tiempo — implementado por Franck (Turno 2) -->

    </section>

    <!-- Módulo de orientación — implementado por Antuaneth (Turno 3) -->

    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>Hackaton TransformaGob 2026 &mdash; Equipo 1500</p>
    </div>
